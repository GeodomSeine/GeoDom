name: Release Production

on:
  push:
    branches:
      - Production

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.set_tag.outputs.new_tag }}  # Passez NEW_TAG comme output du job
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Bump version
        id: bump_version
        run: |
          LATEST_TAG=${{ env.LATEST_TAG }}
          VERSION_PARTS=(${LATEST_TAG//./ })
          MAJOR=${VERSION_PARTS[0]//[!0-9]/}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          NEW_TAG="v$MAJOR.$MINOR.$((PATCH + 1))"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Set output tag
        id: set_tag
        run: echo "new_tag=${{ env.NEW_TAG }}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          debug: true
          script: |
            # Variables
            NEW_TAG="${{ needs.create-release.outputs.new_tag }}"  # Utilisation de l'output du job précédent
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${NEW_TAG}.tar.gz"
            
            echo "🚀 Téléchargement de la release ${NEW_TAG} sur le VPS..."
            
            # Téléchargement de l'archive tar.gz directement sur le VPS
            wget -O ~/production/geodom.tar.gz $DOWNLOAD_URL
            
            echo "📦 Archive téléchargée, décompression..."
            # Extraction de l'archive tar.gz
            tar -xzf ~/production/geodom.tar.gz -C ~/production
            echo "🔧 Déploiement de la release sur le VPS..."
            bash ~/production/deploy.sh production
