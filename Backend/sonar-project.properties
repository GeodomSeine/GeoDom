# Clé et nom du projet
sonar.projectKey=BackEnd-GeoDom

sonar.python.version=3.13.2
sonar.sources=.
sonar.tests=tests

# Rapport de couverture des tests (généré avec pytest et coverage)
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__init__.py, tests/**
sonar.test.exclusions=**/__init__.py
